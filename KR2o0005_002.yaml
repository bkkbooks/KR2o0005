  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0005_WYG_002-1a, image: WYG0685/WYG0685-0714a.png}
body:
  text: 唐書直筆卷二宋吕夏卿撰帝紀第一方鎮方鎮逞兵以窺王土侵蹂得地圍城皆同文穆宗紀書曰長慶元年十一月成德王庭湊圍牛元翼于深州二年三月成德王庭湊入幽州案新舊唐書紀傳自長慶元年七月後幽州為朱克融叛據二年三月當書王庭湊入深州此訛深作幽或上文有脫佚書曰入者惡其專也德宗建中四年正月淮西李希烈寇汝州不書其將以希烈首惡也方鎮違命擅甲兵以侵佚其首酋惡故不書將春秋諸侯大夫師帥皆書方鎮專征犯上無君之惡莫大焉故削其將兵之臣名則其惡不分蓋深繩之也王師破方鎮之兵書而繫以名德宗紀書曰建中二年七月馬燧破魏博田悅之軍于雙岡書破示𠞰絶凶逆魏博者惡悅以地自專故書用國文棄地不書名重圍絶援其力不足以自全雖奔諱其惡肅宗紀書曰至德元年十月初棄平原郡二年八月初棄靈昌郡不書顔真卿許叔冀之名力不足也肅宗紀書曰至德二年五月魯炅自南陽歸襄陽穆宗紀書曰長慶二年四月牛元翼自深州歸京師若全師歸來也方鎮不軌王臣不能固守隳節而喪國土書地以見重德宗紀書曰建中四年十二月李澄以滑州降李希烈懿宗紀書曰咸通九年十月崔雍以和州降龐勛是也方鎮叛亡之人書歸以明同惡代宗紀書曰大厯十年正月昭義叛卒裴志清歸于田承嗣是也方鎮敗王者之師書不利以避䘐國德宗紀書曰建中四年九月王師及淮西李希烈戰于襄城失利不書哥舒翰者師為重也方鎮熾結扼王土之衝足以為一時之患則書之德宗紀書曰建中二年三月淄青李正己以兵屯濟隂是也方鎮擅徙所居則書之德宗紀書曰建中三年七月淮西李希烈遷于許州代宗紀書曰大厯十二年某月淄青李正己遷于鄆州是也方鎮因釁篡逐用兩下相圖文代宗紀書曰大厯十四年淮西李希烈逐李忠臣憲宗紀書曰元和四年十一月蔡州吳少陽殺吳元慶皆不書其帥方鎮承命以討叛則書帥師德宗紀書曰建中二年八月淮西李希烈帥師伐山南梁崇義是也攻伐非君命則以國抗代宗紀書曰大厯十年十月易定李寶臣敗魏博之軍于清水不書敗田承嗣之將盧子期者不與寶臣尋戈擅命也王師克土書收大將以恩信得其地書入其下捨逆以聽命書歸順其下取元惡以自效書獻德宗紀書曰建中四年三月李臯收黃州某月李臯入安州明不用甲兵也代宗紀書曰大厯十年十一月吳希光以瀛州歸順案舊書作吳希光以城降新書作吳希光以瀛州降憲宗紀書曰元和二年十月浙西裴文良執李錡以獻十四年二月淄青劉悟斬李師道以獻不云其帥者獲罪于朝不得以臣子申故用兩下文王師平方鎮先得地而申戮若凶渠授首而闔境甫定則先得雋而後地憲宗紀書曰元和十二年十月王師平淮西吳元濟斬于京師其民久染汚俗無向化之心環數千里之地甲兵富彊踰年然後破繇先翦其境土乃得元惡故先書平淮西後云元濟斬也武宗紀書曰㑹昌四年八月王師斬劉稹澤潞平罪人共得故書王師斬劉稹各用便文也平淮西澤潞不書李訴石雄而書王師申國威也方鎮之寄脅于權宜則書失地之漸宰相失廟堂之謀循方鎮之請則書授地以罪之穆宗紀書曰元和十五年十月初失澤潞謂以劉悟為昭義軍節度使是書失地之漸也敬宗紀書曰寶厯元年十二月宰相李逢吉以澤潞授劉從諌以棄地罪逢吉方鎮拒命奪官爵絶朝貢示天罰之必行也憲宗紀書曰元和四年十月削成德王承宗官爵元和十年七月絶成德王承宗朝貢書地以明國章討叛命將稱詔明皇紀書曰天寶十四載十一月詔封常清帥師討安祿山代宗紀書曰大厯十年四月詔馬燧帥師討李靈曜憲宗紀書曰元和十一年九月詔李訴帥師討吳元濟是也命將權鈞力齊則不書統帥之名肅宗紀書曰乾元元年九月詔九節度之師討安慶緒不書郭子儀李光弼之名軍政不一也憲宗紀書曰元和十一年正月詔六鎮之師討王承宗不書河東幽州盧龍義成橫海魏博昭義節度亦此義也伐叛因其黨斬首遂平則不書王師之功德宗紀書曰貞元元年七月李懷光斬于河中者以賊將牛名俊斬懷光首以城降故不書馬燧之功守土之帥以師相攻擅甲兵之威蔑朝廷之命則書舉兵攻地代宗紀書曰永泰元年五月漢州刺史崔寧舉兵攻劒南不書攻郭英乂以王事為重也守土之帥乘甲兵土地之勢固封疆以樹腹心則書地以記薨君子樂善而忘惡雖功有餘而心不至者皆得以臣道終順宗紀書曰貞元二年十一月八日韋臯薨于成都先薨後地者因其薨殂得地如晉陶侃薨而得荆州之類軍亂其帥見殺以非罪書遇害文宗紀書曰太和四年二月興元軍叛其帥李絳遇害先叛後殺者聞軍變尚冀其生不忍聞其死用緩文軍亂殺其帥以罪書衆殺敬宗紀書曰寶厯二年五月幽州殺其帥朱克融方鎮效順舉族還朝書歸地憲宗紀書曰元和五年十二月張茂昭以易定來歸非兵革所加而得其地書入以褒忠臣其地襲為己有必其心堅于效順乃得之故以來覲賜對為書歸地之日不以管籥符印付任簡迪為歸地也書歸以明舊地逼于天時懼罪入覲書得地憲宗紀書曰元和三年九月庚寅復得襄陽先是于頔為其子所諷歸朝入覲至是日冊拜司空以裴均為山南東道節度使是朝廷始復得故地因以是日書復襄陽也非其心效順故不書頔以襄陽來歸朝廷喜得地而貸罪國法無所申故不書頔至自襄陽也憲宗紀書曰元和十四年八月己酉復得宣武韓𢎞以七月戊寅來朝願奉朝請至是日拜司徒癸丑以張𢎞靖為宣武節度使是朝廷以𢎞靖堅為戎務始復故地因以己酉為復得宣武與于頔事同惟得地已定𢎞靖受命緩故書己酉非異例方鎮昭洗一時之計先書輸賦獻地以蓋國恥憲宗紀書曰元和五年七月庚子成德王承宗請輸常賦以緩師丁未昭洗王承宗復其官爵十三年三月甲寅成德王承宗獻德博二州以緩師庚辰昭洗王承宗復其官爵先是五年承宗請輸常賦朝廷降授官史不書紀者以輸賦為重于時昭洗之命因李師道劉總亟請不得已而從之不書師道請者宥過正罰國家常法非得緣于臣子之情故不書稱緩師豫當時之志也春秋之法陽虎以家臣竊寶玉大弓書盜求名亡也方鎮之重以狙詐陰竊發于輦轂欲不知于人主者必窮姦而正罪名故備書盜名不得蓋示大惡于天下也憲宗紀書曰元和十年三月淄青李師道盜焚河陰轉運院十一年正月成德王承宗盜斷建陵門㦸十一月成德王承宗盜焚獻陵寢宫十年六月成德王承宗盜殺宰相武元衡傷御史大夫裴度不書遣張晏等刺元衡及焚河陰院屋數斫建陵門㦸竿數皆不書者本傳載其事以見惡故紀略文方鎮來朝必書功臣則否擁兵入覲國家休戚之本書入朝臣禮之失也代宗紀書曰大厯九年九月幽州朱泚來朝始通幽州也泚以七月使弟滔奉表以入朝以九月至京師故九月乃書來朝如大厯二年郭子儀李抱玊三年馬璘四年魏少游來朝皆臣子常禮載之本傳昭宗紀書曰乾寧元年正月鳯翔李茂貞入朝不書來朝迹嫌勢逼不與其來也書示臣禮猶存焉昭宗紀書曰二年五月鳯翔李茂貞邠州韓建至京師凌鑠王室臣禮替矣變朝書至譏暴也方鎮失地而朝書奔大去地書至代宗紀書曰大厯十四年三月汴宋李忠臣奔于京師先是忠臣為李希烈所逐狼狽歸朝故不書來朝憲宗紀書曰元和十四年韓公武至自鄜坊書始去鄜坊也文宗紀書曰太和三年十一月王智興至自徐州書始去徐州也權臣權臣出入必書宴對亦書昭宗紀書曰天復三年二月朱溫歸大梁宴于內殿置酒于延喜門天祐元年五月朱溫歸大梁宴于崇勳殿七月朱溫至京師宴于文思毬場十月朱溫自河中至京師對于崇勳殿甲申朱溫歸大梁書逼也權臣征伐書名得地不書殺敵昭宗紀書曰景福二年四月朱溫取徐州時溥死先是溫使將王重師牛存節陷徐州溥殺死不書殺者惡其擅國書溥自死不與溫之專戮也得地猶名者尺寸之地得之非唐所有故本溫志以篡取為文又書曰乾寧四年正月朱溫取鄆州朱瑄死二月朱溫取兗州朱瑾出奔不書其將龐師古葛從周及王重師牛存節之名以溫首惡也不書帥師惡其得衆自大書取使若用竒乘間也權臣以號自大雖朝廷所授皆以自稱書昭宗紀書曰天復三年二月朱溫自稱諸道兵馬副元帥天祐二年十一月朱溫自號魏王備九鍚也權臣擅命屠害忠良以謀翦王室宰相不道賊賢臣以逞憾皆用兩下相殺文昭宗紀書曰景福二年九月李茂貞殺宰相杜讓能哀帝紀書曰天祐二年十二月朱溫殺宰相柳璨光化三年六月崔裔殺宰相王摶讓能以雷州司户柳璨以登州刺史猶以宰相書者惡殺大臣也權臣殺皇子則地昭宗紀書曰乾寧四年八月朱溫殺十二王于石隄谷書地痛之也哀帝紀書曰天祐元年八月朱溫殺六王于西內不書蔣𤣥暉殺之者本朱溫志也國變擾攘大臣見害于圍逼則書遇害僖宗紀書曰廣明元年十二月于琮崔沆豆盧瑑為黃巢所害是也權臣雎盱書得地之始以謹召亂之階僖宗紀書曰光祐二年三月董昌初得越州錢鏐初得杭州七月李茂貞初得鳯翔中和三年五月朱溫初得汴州書得地之張本權臣任用之漸必直文以示義明皇紀書曰天寶二十九載七月以安祿山為營州刺史平盧節度副使僖宗紀書曰咸通十一年正月以李國昌為振武節度使中和元年八月王鐸以朱溫為華州刺史始見祿山國昌朱溫之惡也權臣窺窬神器遷徙都邑以奉天子為文昭宗紀書曰天祐元年閠四月朱溫奉天子都于洛陽不書遷諱逼脅也不書甲辰天子至洛陽者非天子之意也故不書至餘具崔裔傳四夷冊立弔祭之使不書不以中國臨夷狄也如元和十六年六月以少府少監李鋭持節赴南詔冊立左贊善大夫許堯佐副之不書憲宗紀若使人傳無殊尤之事則具夷狄之傳唐制大喪天子以卿大夫告于四夷則書于紀太皇太后皇太后皇后之喪方鎮遣使以告則書本傳如元和十一年四月太后崩劒南李夷簡遣使南詔告哀餘具夷簡傳戎狄方鎮拘行人以拒命賤者名而不官太宗紀書曰貞觀八年十一月吐谷渾執我行人趙道德不書鴻臚丞官微也宣慰宣諭使宣慰宣諭使被執稱以異國絶之也先使後執不與逆臣縶王人從緩文德宗紀書曰建中四年四月太子太師顔真卿使于淮西被執不書李希烈軍者春秋衛伐凡伯貶之稱戎希烈肆不臣之逆故豫其志以國稱深貶之也不書宣慰者君命不申也使出疆能利社稷安人民不辱君命則書宣慰宣諭之名德宗紀書曰建中四年十二月以給事中孔巢父宣慰田悅軍穆宗紀書曰長慶二年三月以兵部侍郎韓愈宣慰王庭湊軍不云魏博及鎮州者元惡懾伏不失臣節不用國文行人不能度權宜防變以辱君命則書國殺德宗紀書曰建中四年七月給事中孔巢父遇害于河中惡國威之沮廢故懷光得以稱國用重文與顔真卿異例王者受命必有驅除故僣命餘孽用敵國之文攻克正土則書陷王師失利書戰而後敗敵國之臣得以名通侵伐書將高宗紀書曰武德二年九月劉武周陷我并州七月王世充使其將羅士信侵我榖州書將用敵國之禮又書曰武德二年九月王師及劉武周戰于介州敗績王師之敗先書者非尅㑹期日以決勝負遇敵來戰失備致敗從緩文不書裴寂敗姜寶誼死輿尸辱命用微者之文王師勝捷則書大將之名小捷用計詭勝書破高祖紀書曰武德元年九月秦王帥師及薛仁杲戰于淺水原大敗之俘馘具仁杲傳又書曰武德二年十一月秦王帥師破宋金剛之衆于美良川是小捷用計詭勝同文僭國僭命之國以地歸順則先人後地高祖紀書曰武德二年十月羅藝以幽州歸于我五年七月杜伏威以江東歸于我以者自專之文窮蹙之寇以地降用國文高祖紀書曰武德元年十一月隴西薛仁杲降四年十一月荆州蕭銑降以窮兵極討乃取之國用自降為文書國以得地為重也鄰國并吞非王師致討書自滅高祖紀書曰武德二年某月丹陽沈法興滅四年十一月江東李子通滅五年某月豫章林士𢎞滅不書李子通王雄誕張善安滅之者强弱吞噬朝廷威力所不加其地不入以不知文僭竊之國因其下一時之計則地以衆書高祖紀書曰武德三年四月河西執李軌以地歸于我六年正月山東執劉黑闥以地歸于我七月二月漢陽殺高開道以地歸于我不書葛德威安修仁執黑闥李軌張金樹殺開道者以衆書也不云河西山東漁陽平者非甲兵致討而得地從自致文方鎮拒命其下以元惡自效則以名見異文也賊師來降其地未入而復叛則不書于紀武德元年八月涼州李軌以地降至十月復叛則書本傳而已疆寇病死逭國罰書地高祖紀書曰武德元年八月薛舉死于隴西代宗紀書曰永泰元年九月僕固懷恩死于靈武是也疆冦夷定則先地後滅略將以明威高祖紀書曰武德四年五月王師平河北竇建德滅丙寅王師平河南王世充滅五年王師平并州劉武周滅先地後滅以得地為重不云秦王平建德世充武周者略將以明威叛臣肆噬取元惡而宥枝附則不用方鎮敵國之文憲宗紀書曰元和元年九月高崇文擒劉闢平成都一方脅從民本非懷二心先得雋乃取其地故後云平成都逆臣竊大號書地示不通于天下明皇紀書曰天寶十五載正月安祿山僭即皇帝位于洛陽肅宗紀書曰乾元二年四月史思明僭即皇帝位于范陽德宗紀書曰建中三年十一月朱滔王武俊田悅僭即王位于魏縣四年十月朱泚僭即皇帝位于京師僖宗紀書曰廣明元年十二月黃巢僭即皇帝位于京師是也逼脅干紀原心定罪不用僭文代宗紀書曰廣德元年十月吐蕃以廣武王承宏為皇帝僖宗紀書曰光啓二年十月朱玫以嗣襄王熅為皇帝昭宗紀書曰光化三年十一月劉季述以太子裕為皇帝是也僭命之盜為子所殺雖得罪于天下而父子之義存焉天下所不容故不書竊位而記其亡終故事肅宗紀書曰至德二年正月安祿山為子慶緒所殺上元二年三月史思明為其子朝義所殺乾元二年三月安慶緒亡代宗紀書曰寶應元年史朝義亡悖義負固自取潰爛故書亡其地未入朝廷不書平慶緒朝義皆不書即僞位具本傳義師王室有變舉義以謀興復則異文以見志中宗紀書曰垂拱四年八月越王舉師于豫州九月越王敗績光宅元年九月徐敬業舉兵于揚州十二月徐敬業敗績凡討叛必命將不書岑長倩張光輔鞠崇裕李孝逸討越王敬業者不與武氏之抗義舉也敬業雖以興復為名其迹可疑故不用越王之文特書起兵不書斬越王及敬業隱之也巡幸王者攬謡俗之善惡知王業之艱難其行以時則書幸不書還宮明皇紀書曰開元十年十月幸興慶宮不書還宮者雖踰月民不知勞故不書出非其時稱駕所至書還宮明皇紀書曰天寶八載十月車駕至華清宮九載正月車駕還宮不書皇帝者習盤遊之樂損萬乘之威以車駕稱輕銜橛之變忘魚服之辱書還宮以見其志明皇是嵗幸華清宮踰時忘反受朝賀于離宮故危之征伐巡守得禮書帝失禮書詔踰宿則皆書至明皇紀書曰開元十一年正月皇帝北巡守三月皇帝至京師得禮也太宗紀書曰貞觀十九年二月詔親征高麗二十年皇帝至自高麗失禮也以萬乘之重爭無人之地馳驟不測之險危之道也故書詔征不使帝者當失禮之過也得禮則書至京師示無虞也失禮則書至自某所者乘輿未還以前興事過舉擾民玩威下情離動變生非常故不書至京師朝賀受朝賀失禮則書地不受朝賀則不書朔明皇紀書曰天寶九載正月朔受朝賀于華清宮失禮也德宗紀書曰貞元二年正月皇帝不受朝賀憲宗紀書曰元和十一年正月以嵗饑及宿師罷元㑹皆不書朔宴饗燕㑹得禮則書地失禮則書宴明皇紀書曰天寶十四載三月勤政樓宴群臣憲宗紀書曰十三年二月麟德殿宴群臣得衎樂慈惠之道行于禮而後于酒食故後書宴中宗紀書曰景龍四年四月宴群臣于芳林園敬宗紀書曰寶厯二年九月宴群臣于宣和殿禮至于瀆有濡首俄辨之咎是厚于酒食而忘鹿鳴精誠之意故先書宴賜宴之例則先書賜尊君命也敬宗紀書曰寶厯二年二月賜群臣上已節宴曲江亭文宗紀書曰開成二年十月賜群臣慶成節宴于曲江亭是也土木功土木之功雖用民以時亦書失時之役稱詔文宗紀書曰太和八年正月修太廟九月二日詔修曲江昆明二池是時發神䇿軍修淘曲江從鄭注之邪說故書詔以病奪民之時也親蠶親蠶之禮不書本紀譏后德之不建也肅宗紀書曰乾元二年三月皇后禮先蠶于苑中高宗之世武后四親蠶不書其德不足以率天下故載之本傳藉田藉田如禮則異文以示勸高宗紀書曰儀鳯二年正月皇帝躬藉田于北郊明皇紀書曰開元十九年正月皇帝躬藉田于龍地藉田之禮王者不以身率下則三時怠而生業匱故藉田行禮書躬而稱地欲海內知王化尚農也若如禮以至九推民忘盡力農田之勞而相勸于下必異文以示褒明皇紀書曰開元二十三年正月皇帝有事于藉田肅宗紀書曰乾元二年正月皇帝有事于藉田不云躬藉者勸農率下之意明失禮過舉舉難行之事以便世益民則書明皇紀書曰開元二年秋七月焚珠玊錦繡于殿庭德宗紀書曰大厯十四年閏月罷劔南貢春酒放舞象荆山之陽者是也失禮過舉直文以見惡肅宗紀書曰乾元元年六月初祠太一神譏淫祀也穆宗紀書曰元和十五年九月大合樂于魚藻譏喪制未踰年也封禪朝陵備于志車駕順動之節書于紀重王者出入也賜酺肆赦必書一時之澤高宗紀書曰麟德二年十月皇帝發東都乾封元年正月皇帝封太山禪社首四月皇帝至自泰山明皇紀書曰開元十三年亦如之其車輅次頓御壇受賀皆見本志惟大赦賜酺備于本紀明皇紀書曰開元十七年十一月皇帝發東都朝五陵戊申皇帝至自朝陵其餘丙申謁橋陵戊戌謁定陵皆見本志惟還宮大赦天下流移人並放還以下載于本紀災祥水旱日月蝕星孛霜蝗地震山崩弛役避殿減膳親録囚徒遣使賑給則載之本紀有天地之變而無修省之實則載之五行天文志懲不戒也祥瑞福應之事王者成德所致則載之本紀以事繼日月否則總于一嵗之終書曰某月鳯凰見于某地某郡獻白龜是以事繼于日月也其餘郡國所書虛美所加則書曰是嵗鳯凰見某地某郡獻白龜不實也詔令號令詔諭民所取信未行而遽改名存而實亡則不書如貞觀十五年四月詔以來年四月有事于泰山不書太宗紀而見之天文志星索前開元二年十月吐蕃侵渭源詔親征天寶十五載六月將謀幸蜀下詔親征乾元二年十月下詔親征史思明不書明皇肅宗紀而見吐蕃及安史傳太子事太子齒胄釋奠加元服謁太廟成君則書于紀睿宗紀書曰景龍元年八月三年十一月太子釋奠于太學是也開元七年九月皇太子齒胄于國學八月皇太子加元服乙丑謁太廟二十一年五月皇太子納妃其後太子瑛廢故皆不書明皇紀具瑛本傳皇后事皇后所行之事不書于紀如顯慶五年武后宴親族鄰里命婦于并州龍朔元年武后請禁婦女為俳優之戲景龍二年韋后以裙上有五色雲大赦天下神龍元年韋后請天下士庶為出母服百姓二十二成丁五十九免役如此之類亦皆具武韋二后傳舊史載之高宗中宗紀失史法也唐書直筆卷二
