body:
  text: 唐書直筆卷一宋吕夏卿撰帝紀第一名字王者帝天下名所以事宗廟禮天地也其餘接見臣下從謙稱則名無所通焉帝名之例始于范蔚宗陳壽古今之通制也史記漢書不載帝名失于簡畧也漢高祖以劉季稱光武以文叔稱然則帝之有字尚矣唐高祖字叔徳劉昫之書不載案劉昫原本訛劉敬今改正史之闕文也書母禮家貴嫡示天下之本也非嫡則不書母母以子貴子以母貴子立然後書所以生于母傳正也代宗紀書曰母章敬呉皇后案章敬原本訛章恭今改正餘則不書所生母如元獻楊太后傳中載生肅宗故略于此即位繼世而立書即位用常文書曰皇太子即位于柩前書柩前示承顧命之重也繼故而立其賊不討則為子之誼輕不稱太子無嗣父之道也文宗紀書曰寳厯二年十二月皇帝即位敬宗遇弑文宗以弟繼統縱賊不討貶也穆宗紀書曰元和十五年正月皇帝即位不稱太子者陳𢎞志不討則太子之誼不明故從兄弟稱用文宗例明以帝制而立也中宗紀書曰案中宗原本訛哀宗今校改景龍四年六月溫王即皇帝位哀帝紀書曰天祐元年八月輝王即皇帝位㣲不足以討賊非貶也不稱皇太子者矯先君之顧命出于一時之權宜故但以溫王輝王書内禪内禪非正之制也涉權宜而逼大體則書踐阼而不稱太子傳襲計定人無異志則書踐阼而不稱皇帝若讓不忍嗣然高祖紀書曰武徳九年八月皇帝傳位為太上皇睿宗紀書曰案睿宗原本訛高宗今校改先天元年八月皇帝傳位為太上皇太宗紀書曰八月太上皇傳位皇帝踐阼于顯徳殿明皇紀書曰八月太上皇傳位庚子皇帝踐阼于武徳殿太宗明皇紀皆先載建成元吉太平公主之難及事克内禪之命行焉臣子之謀非一朝一夕之故變也于傳位之下復出太上皇傳位明神器有所授也順宗紀書曰貞元二十一年八月皇帝傳位于皇太子憲宗紀書曰貞元二十一年八月内禪乙巳皇太子踐阼於宣政殿録内禪以起踐阼者人望所屬宗廟有主推天命之歸故不書太上傳位不嫌所授不明也受内禪不書即位嫌父在而取大寳稱踐阼明代父之誼從緩文立太子太子社稷之繫父在不得以君稱書名從臣下之辭人神所歸則書立睿宗紀書曰景雲元年七月立皇太子隆基是也立不以正非天下之心所在則書子從私恩也高宗紀書曰永隆元年八月立子哲為皇太子是也太子薨不名諡葬在乎傳不成恩也徳或無良雖嫡亦絀先書廢從天下之志也文宗紀書曰開成三年九月廢皇太子永為太宗紀廢皇太子承乾同文天下之人知其可廢亦不足以為君故先云廢嬖奪其恩廢不以過後書廢非得罪于天下天下不知太子之廢也明皇紀書曰開元二十五年四月皇太子忠廢與高宗紀皇太子賢廢同文謂無可奪之罪後云廢從緩不忍辭其徳足以奉宗社而失愛君親罹于非命書殺迫也中宗紀書曰景隆三年七月殺皇太子重俊不書部下所殺稱君命以紓海内之痛立皇后皇后共承宗廟海内之母立以徳不以愛正家之道也先書君命正也太宗紀書曰武徳九年八月立皇后長孫氏先書立徳選肅宗紀書曰至徳元年四月立皇后張氏同文張氏雖以凶終然其惡不累故用異例廢以罪不以私則書廢從天下之人廢之也明皇紀書曰開元十二年六月廢皇后王氏不稱廢為庶人嫌齊體之偪也王皇后詔載于本傳若無罪不出詔加罪之誣不足信于後人也立以嬖不以徳廢以譖不以罪則異文見實中宗紀書曰神龍元年立妃韋氏為皇后高宗紀書曰永徽六年七月皇后王氏廢是也以愛奪權以計得衆立非恩徳則從自立文高宗紀書曰永徽六年十月皇后武氏立是也凡立后恩澤皆出于已大赦天下老人賜粟不出高宗紀者惡武后之立正始而杜漸故但載武后本傳國變遭絀書權臣之命幽逼致崩云死惟皇后不云殺嫌齊體也哀帝紀書曰天祐二年十二月皇后何氏死乙酉朱溫追廢皇太后何氏是也庚戌輟郊詔載于何后本傳者惡朱溫之誣不出哀紀宰相拜復宰相國之股肱升黜書于紀重安危之本也書得人不備官睿宗紀書曰景龍四年四月以許州刺史姚元之為丞相不書為兵部尚書門下三品具本傳瘝官不書君命懲濫恩也明皇紀書曰開元二十四年十一月牛僊客為丞相是也用得其人功利社稷因其媒孽而輟柄用則先名而後免明皇紀書曰開元二十四年十二月丞相張九齡罷以一時之罪而惜其功不欲聞罪免之命故後罷用緩辭于本傳復書某月某日罷以某代之足紀文也罷相之後或更方鎮遷他官皆詳于本傳徳宗紀書曰貞元十一年四月丞相陸贄貶于忠州贄以太子賓客貶忠州别駕為丞相書者繇上意之囘惑庸䜛之枉譖雖竄謫善人逺方而天下之望不替故猶稱丞相不書别駕而稱貶者君命實放逐其虚器所加從略不勝其任以過而罷則先免而後名國罰明也有罪之放先書貶録過以正罰則罪名正而天下服徳宗紀書曰建中四年十二月貶丞相盧把于新州位浮其材海内知其可去故先書貶竄之命宰相薨于位書名而不氏代宗紀書曰天厯十二年七月丞相綰薨是也罷相書氏大勲勞書薨記功也賢臣死于貶所書地隱之也徳宗紀書曰建中元年五月汾陽王郭子儀薨貞元五年八月庚戌西平王李晟薨録勲勞也徳宗紀書曰貞元某年某月丞相陸贄卒于忠州文宗紀書曰太和九年七月丞相宋申鍚卒于開州非罪而黜雖死書舊官記終也變薨言卒者傷賢臣不復故輕文譏王者不能用舊臣也宗室屬逺亦書明皇紀書曰天寳十一年十月信安王禕薨是也賢臣云亡海内所痛位名氏備而書卒若廢朝簡而贈賻殺則不書敬宗紀書曰長慶四年十二月吏部侍郎韓愈卒賢臣記終也賢相告老乞骸骨書薨與賢臣異文文宗紀書曰開成四年三月晋國公裴度薨不書丞相罷也殺大臣有罪書伏誅無罪書賜死非君命書害代宗紀書曰大厯十二年宰相元載伏誅國法行也中宗紀書曰天授二年十月左相岑長倩賜死案舊書新書並載殺岑長倩于武后紀此作中宗記當是夏卿修史時所擬改逼君命也中宗紀書曰神龍二年某月武三思害侍中桓彦範及敬暉袁恕已文宗紀書曰案文宗原本訛中宗今校改太和九年十一月仇士良害宰相王涯及賈餗舒元輿書三思與士良之名惡專戮大臣也餘臣有罪書誅無罪書殺明皇紀書曰天寳六載春正月誅北海太守李邕開元二十五年三月殺監察御史周子諒書誅者成法不可變王者至公之刑也書殺者觸威忤㫖罹于非命王者一時之罰也命將征伐征伐國家廢興之大政也將得人書帥師討有罪書伐高宗紀書曰乾封元年十月遼東道大總管李勣帥師伐高麗不云命司空英國公李勣為遼東大總管者紀書成命傳其實事也將非其人書王師伐不得罪大戰書及明皇紀書曰天寳十四載四月王師及雲南大戰于瀘川敗績不書劍南節度使鮮于仲通將之者貶無功也書及者無名興師及爭土拓地玩威喪徒國家危亡之釁故不書王師不勝通以敗績書將擅出師雖伐得罪出而有功皆書自專書曰某月某日將軍某以師伐某國以者左右自用之文官軍失利以將名師惡衂國也効命而死書失利將奔北俘辱書大敗明皇紀書曰開元二十年閠三月郭英傑之師失利于都山英傑死之英傑蹈義喪元不隕臣節書死而再名嘉之也明皇紀書曰天寳十四載十二月封常清之師大敗于甖子谷幸陜郡十五年六月哥舒翰之師大敗于靈寳執哥舒翰翰及常清奔書執之再名罪失律也英傑常清皆一時名將雖敗軍猶不稱王師王師有功執其醜虜書獲明皇紀書曰天寳十四載十二月常山太守顔杲卿敗安禄山之軍獲其將何千年高邈以似禽獸稱獲將以辱命而誅書斬于軍中否則書斬殺無罪也明皇紀書曰天寳十四載十二月高仙芝封常清斬于軍中誅辱命也勝負之勢用兵常數士不素習輿尸奔北雖國法必申而其罪可貰用輕文書曰某年斬將軍某裨校之屬雖有功書元帥之名重兵柄之分也徳宗紀書曰建中二年十一月宣武節度劉洽破淄青李納之軍于徐州不書神䇿將曲環名一軍政于劉洽也執戎狄則大將不名太宗紀書曰貞觀四年三月執突厥頡利可汗是也以能禽之故大將不名也破戎狄必稱王師太宗紀書曰王師破突厥于隂山不書李靖之名舉中國之重也其餘具突厥靖傳不稱王師者窮兵黷武非中國之道用輕文太師紀書曰十四年八月平高昌城十九年五月甲申收遼東城是也戎狄之心勢窘則幸生服叛不一無嚮化之常惟可汗來奔則書太宗紀書曰三年十二月突厥突利可汗什鉢苾來奔其餘雖名王酋豪來皆載之本傳不列帝紀不與中國受叛人也明皇開元二年突厥黙啜妹壻火拔頡利發石失畢來奔不書明皇紀是也戎狄之俘獻于社廟不書大將之名受俘亦如之懲首事也太宗紀書曰貞觀四年三月獻突厥之俘于太廟二十三年正月獻龜兹之俘于社廟明皇紀書曰開元二十年五月皇帝御應天門受俘是也中國之俘獻于社廟皆書大將之名受俘亦如之襃大功也高祖紀書曰案高祖舊訛高宗今校改武徳二年七月秦王獻竇建徳王世充之俘于太廟憲宗紀書曰元和十四年二月皇帝御興安門受田𢎞正所獻李師道之俘是也宰相統兵書天子遣師重本朝之寄也憲宗紀書曰元和十二年八月裴度征淮西呉元濟皇帝御通化門遣師昭宗紀書曰龍紀元年五月張濬征大原李克用帝御安喜門再拜銜涕而辭上賜之犀帶具本傳公主下降公主下嫁外國必書逆女之使太宗紀書曰十三年十二月吐谷渾遣使來逆女十四年二月𢎞化公主歸于吐谷渾春秋紀裂繻來逆女中國之臣得以名通吐谷渾慕容諾曷鉢逆女不書名惟以使稱不書逆女之使以公主大歸為名淮陽王道明送𢎞化公主不書本紀尊中國也具吐谷渾傳而已外國求婚之使不書于紀使若其請不必皆然貞觀十四年六月薛延陀遣使求婚具吐蕃傳是也中宗紀書曰景龍三年十一月吐蕃遣使逆女四年正月車駕幸始平送金城公主歸吐蕃緣當時之意故異文非新例也曲赦咸陽故不書于紀具吐蕃傳足本傳之文也公主釐降無求婚逆女之使則不書于紀禮不足也開元五年固安公主妻奚首領李大酺案舊唐書奚國傳作李大輔永樂公主妻李失活乾元元年肅宗第二女寧國公主案寜國舊訛寜親今校改出降囘紇皆具本傳而略于帝紀為中國諱也公主無子絶歸則書自還肅宗紀書曰乾元二年八月寧國公主自囘紇還是也結好不固以師而歸變文書至喜之也武宗紀書曰㑹昌三年三月太和公主至自囘紇是也公主死于外國則書于帝紀而略于本傳書曰某月某日公主薨于某國是也外國之君赴告不書于紀春秋呉越之國卒而不書葬惡其僭而失禮外宗稱藩而臣其一國風化之所不及卒雖赴告當例于本傳絶域内屬書本傳儆慢防之易也聖人内寧必有外憂故四夷奉珍獻寳奔走京師其心非素被天王之化顧其勢使然故不列帝紀是不忘豫防之警結好之盟先書戎狄以明汲汲也徳宗紀書曰建中四年正月吐蕃及鳯翔節度使張鎰盟于清水戎狄無信盟詛末節要以神明之信非中國之福故先書吐蕃示汲汲于中國也不書吐蕃相尚結贊之名所以重中夏也渝盟有變則不地徳宗紀書曰貞元二年閠月吐蕃及侍中渾瑊盟執我行人崔漢衡路泌以下皆不書㣲也戎狄乞盟不書涖盟之臣䝉上文也穆宗紀書曰長慶元年九月吐蕃乞盟十月及吐蕃盟不地不書丞相植涖盟皆具吐蕃本傳亂臣亂臣賊子其謀有漸王者執馭下之柄必防微塞源焉書起而不云叛貴失御也明皇紀書曰天寳十四年十一月安禄山起于漁陽是也負固怙亂之雄乘伺釁隙而作有國所不免書叛有地也徳宗紀書曰興元元年二月李懷光以河中叛憲宗紀書曰元和二年十月李錡以潤州叛是也無地書據劉闢以西川行軍司馬因韋臯之薨竊據成都憲宗紀書曰貞元二十一年八月劉闢據成都以叛無地也竊地自固非君命所授用自立文徳宗紀書曰建中二年二月梁崇義以襄陽自立以五使宣諭李舟如荆襄拒境不納是反狀已明至是加崇義同平章事不受詔故以崇義自立為文軍逐其帥不預謀而立用衆立文穆宗紀書曰長慶元年七月幽州立其帥朱克融是也不書立洄具本傳蕃臣失撫馭之和以罹逼脅用衆逐文穆宗紀書曰長慶元年七月幽州逐其帥張𢎞正是也非意之變失備見逐書奔文宗紀書曰案文宗原本訛太宗今校改太和五年正月李載義自幽州出奔是也春秋諸侯之子列于盟㑹則位定方鎮之孤以留後自立朝廷因而授之容非篡盜書立徳宗紀書曰貞元二年六月滄州程懐直立是也不書程日華卒者方鎮不卒拒君命于外失臣子之義書拒命以見惡肅宗紀書曰上元元年二月來琪以襄陽拒命是也不云叛其惡輕唐書直筆卷一
