body:
  text: 唐書直筆卷四宋呂夏卿撰新例須知髙祖至哀帝二十帝十四世享國二百八十九年髙祖太宗子內禪髙宗子即位中宗子即位睿宗弟即位玄宗子內禪肅宗子即位代宗子即位德宗子即位順宗子即位憲宗子內禪穆宗子繼故敬宗子即位文宗弟繼故武宗弟即位宣宗叔即位懿宗子即位僖宗子即位昭宗弟即位哀帝子即位諸王二百十一宰相三百七十一人髙祖十人太宗二十三人髙宗四十二人武后六十八人中宗十六人睿宗十二人玄宗二十四人肅宗十六人代宗五人德宗三十四人順宗五人憲宗十七人穆宗九人敬宗一人文宗十三人武宗七人宣宗十九人懿宗十五人僖宗十四人昭宗二十二人哀帝二人列傳二千二百四十六人后妃三十三人公主二百十四人列女四十七人婦人計二百九十四人羣臣正傳八百六十三人子孫附見五百八十二人附傳二百十八人忠義五十人孝友二十六人卓行五人隱逸二十三人循吏十九人宦者二十一人酷吏十六人外國六十二文武官數元和中二千七百八十八員大中中二千七百九十九員十道州縣關內河南河東河北山南隴右淮南江南劍南嶺南州府三百二十八縣一千六百三十九羈縻州府八百五十六天祐以前方鎮六十四外有觀察使五防禦使六關內十二河南九河東九河北六山南東四河西二隴右二劍南五淮南一江南東四江南西四黔中一嶺南五山南西四田數開元中一千四百四十萬三千八百六十二頃一十三畝大中中一千一百六十八萬八千三百五十四頃稅賦天寶中租錢二百萬餘緡粟一千九百八十萬餘斛庸調絹七百四十萬餘匹綿一百八十萬餘屯布一千三十五萬餘端大中中稅錢八百五十九萬二千六十一緡九百九十文兵數開元中四十九萬人大中中九十九萬七百一十五人馬數開元中三十二萬五千七百匹鹽數肅宗上元以後九百萬餘緡大中中四百八十一萬二千四百四十一緡三百九十文運米天寶中二百五十萬石大中中一百四十三萬七千八百八十六石茶錢大中中六十萬三千三百七十緡九十七文酒錢大中中一百三十七萬九千九十一緡二百八十六文鑄錢天寶中三十萬七千餘緡大中中一十八萬四千二百三十餘緡厯戊寅髙祖麟德髙宗開元大衍明皇寶應五紀代宗建中正元德宗元和觀象憲宗長慶宣明穆宗景福崇玄昭宗外有中宗景龍之厯肅宗至德之厯藏書五萬一千八百五十二卷案此同舊書著録數新書增二百四十二卷改元七十五大赦三百一十九貢舉二百六十七舊書紀志傳約一百九十萬字新紀志傳約一百六十四萬字外新添表約一十一萬二千九百三十字廢傳六十一暢璀趙國珍韋元甫裴胄慮􅮅姚令言張光晟源休蔣鎮洪經綸彭偃李若初于頎盧徴鄭元薛伾閻巨源李祐董重質張正甫徐晦盧商案以上二十二人舊書分次列傳新書以裴胄附裴漼以李若初于頎盧徴附劉晏以盧商附鄭肅以徐晦附文藝歐陽詹以李祐董重質附藩鎮吳少誠以姚令言張光晟源休蔣鎮洪經綸彭偃併入逆臣朱泚叛臣喬琳秖廢暢璀趙國珍韋元甫盧􅮅鄭元薛伾閻巨源張正甫八傳李君球楊茂謙閻濟美案以上三人舊書入良吏新書惟楊茂謙附循吏韋景駿後以李君球諌髙宗伐髙麗疏别載外國髙麗傳以閻濟美被劾事别見盧坦傳周興萬國俊來子珣王𢎞義羅希奭案以上五人舊書入酷吏新書仍存王𢎞義以周興萬國俊來子珣附來俊臣以羅希奭附吉溫李公逸張善相李玄通馮立謝叔方成三郎尹元真薛願袁光庭邵真案以上十人舊書入忠義新書以李公逸張善相附李肓德以李玄通附王行敏以馮立謝叔方附敬君𢎞以薛願附龐升以袁光庭附程千里以邵真别附藩鎮李惟嶽秖廢成三郎尹元真二傳王君操案舊書與張琇分列孝友新書合附琇傳孔紹安庾抱鄭世翼張藴古盧照鄰楊炯駱賓王鄧玄挺喬知之富嘉謨李拯案以上十一人舊書入文苑新書文藝傳以庾抱附賀德仁以鄭世翼附崔信臣以張藴古附謝偃以盧照鄰楊炯駱賓王鄧玄挺附王勃以富嘉謨附尹元愷以孔紹安冠其孫若思前改列儒學秖廢喬知之李拯二傳許胤宗乙弗𢎞禮張憬藏張文仲尚獻甫金梁鳯葉法善僧玄奘僧神秀僧一行案以上十人舊書入方技新書仍存尚獻甫以許胤宗張文仲附甄權以乙弗𢎞禮張憬藏金梁鳯附袁天綱以葉法吾附薛頤秖廢玄奘神秀一行三傳新添傳后妃郭貴妃王賢妃宗室李從晦李之芳李知柔案原本李從晦訛李晦之芳訛之方知柔訛之柔考舊書已附李晦于河間王孝恭新書增從晦附襄邑王神符增之芳附蔣王惲增知柔附惠宣太子業今參據改正諸帝公主案此下原本無目前載列傳人數云公主二百十四人今考新書諸帝公主傳實二百十二人列傳薑寶誼段成式溫佶溫廷皓髙重杜求仁杜咸石仲覽趙來章趙元裴稹裴均史大奈馮子猷契苾明泉男生泉獻誠論弓仁論惟貞石抱忠韓思彥陸希聲裴胄先韋顗韋知人韋維韋繩韋虛心韓朝宗宋務光吕元泰武平一盧襲秀崔碣韋縚盧若虛姚合姚朂蘇詵蘇震蘇幹裴佶嚴徹劉迥劉秩劉迅李彚荔非元禮郝廷玊李國臣張伯儀白元光陳利貞侯仲莊烏承玭元結戴叔倫趙惠伯嚴郢李德修康日知牛元翼傅良弼李寰劉潼董溪段伯倫段文楚陽旻獨孤及顧少連杜孺林杜顗韓昱陳諫凌準韓泰杜羔杜中立劉義皇甫湜盧同賈島鄭薰敬晦韋博李景溫顧師雍李貞素崔嘏丁柔立劉助蕭鄴韋琮鄭延昌裴坦盧光啓韋貽範韓偓韓儀周寶鄧處訥雷滿劉巨容馮行襲趙德諲趙匡凝楊守亮楊晟顧彥朗顧彥暉李罕之王敬武孟方立楊行密孫儒髙仁厚趙犨趙昶趙珝田頵朱延夀劉建鋒成汭杜洪鍾傳劉漢宏張雄王潮劉知謙盧光稠案原本溫佶訛溫嚳盧若虛訛韋若虛杜孺休訛許儒林李景溫訛李景讓鄧處訥訛鄧處晦今考舊書無傳新書增立者史大奈泉男生論弓仁韓思彥宋務光武平一元結戴叔倫嚴郢康日知牛元翼獨孤及顧少連鄭薰敬晦韋博蕭鄴韋琮鄭延昌裴坦盧光啓韓偓周寶鄧處訥劉巨容趙德諲楊守亮楊晟顧彥朗李罕之王敬武孟方立楊行密孫儒髙仁厚趙犨田頵朱延夀劉建鋒成汭杜洪鍾傳劉漢宏張雄王潮劉知謙四十六人類附泉獻誠論惟貞吕元泰傅良弼李寰韋貽範韓儀雷滿馮行襲趙匡凝顧彥暉趙昶趙珝盧光稠十四人移舊書之良吏髙智周孝友趙𢎞智文苑陳子昻員半千及雜入忠義之李景讓五傳附以石仲覽趙來章趙元石抱忠李景溫五人其薑寶誼段成式溫佶溫廷皓髙重杜求仁杜咸裴稹裴均馮子猷契苾明陸希聲裴胄先韋顗韋知人韋維韋繩韋虛心韓朝宗吕元泰盧襲秀崔碣韋縚盧若虛姚合姚朂蘇震蘇幹裴佶嚴徹劉迥劉秩劉迅李彚荔非元禮郝廷玉李國臣張伯儀白元光陳利貞侯仲莊烏承玭趙惠伯李德修劉潼董溪段伯倫段文楚陽旻杜孺休杜顗韓昱陳諫凌準韓泰杜羔杜中立劉義皇甫湜盧同賈島顧師雍李貞素崔嘏丁柔立劉助六十六人序次時代分附舊書已有之裴寂段志玄溫大雅髙士亷杜正倫裴行儉馮盎契苾何力陸元方裴炎韋湊韓思復桓彥範崔玄暐韋安石盧藏用姚崇蘇瓌裴耀卿嚴挺之劉子玄李光弼楊炎李吉甫劉晏董晉段秀實陽惠元杜佑王叔文杜兼韓愈王璠李德裕劉瞻各傳與此一百三十一人悉可證合忠義馬元規王行敏盧士睿李育德賈循南霽雲雷萬春張興蔡廷玉孟華黃碣孫揆案舊書忠義傳無此十二人新書增王行敏李育德賈循張興蔡廷玉孟華黃碣七傳分附盧士睿孫揆又以馬元規南霽雲雷萬春三人分附舊書已有之吕子臧許遠二傳孝友任敬臣支叔才程袁師武𢎞度宋思禮鄭潛曜元讓萬敬儒章全益沈季詮許伯會侯知道許法慎林攢陳饒奴王博武案舊書孝友傳無此十六人新書並增立隱逸朱桃椎秦系張志和陸羽陸龜蒙案舊書隱逸傳無此五人惟于大臣髙士亷傳附見朱桃椎新書隱逸傳此五人並增立循吏韋丹韋岫韋宙盧𢎞宣薛元賞何易于案舊書良吏傳無此六人新書循吏傳並增立儒學蕭子儒案舊書儒學傳蕭德言後次許叔牙附以子子儒此蕭子儒當作許子儒今姑仍原文以識其誤沈伯儀張齊賢陳貞節施敬本盧履冰王仲邱康子元啖助韋彤陳京韋公肅案舊書儒學傳無沈伯儀以下十一人新書並增立文藝劉藏器元正元義方元季方王助吕向張旭裴旻皇甫冉李觀鄭虔蕭存柳并盧綸歐陽詹歐陽秬吳武陵李頻吳融案舊書文苑傳無元正以下十七人惟劉藏器附見劉胤之傳末僅云從父兄子藏器亦有詞學官至宋州司馬是亦未可謂有傳矣其與尚可孤同傳之李觀乃洛陽人非贊皇李華之從子也新書文藝傳以藏器附其從兄延祐以元正元義方元季方附元萬頃以王助附王勃以張旭裴旻附李白以李觀附李華以蕭存栁并附蕭穎士增立吕向皇甫冉鄭虔盧綸吳武陵李頻吳融又歐陽詹附以從子秬可與此證合方技袁客師杜生邢和璞師夜光羅思逺薑撫案舊書方技張果傳有邢和璞師夜光附見新書增詳之而羅思逺增附其後以袁客師附其父天綱又增立杜生薑撫可與此證合列女房玄齡妻盧李畬母汴女李堅貞節婦李髙睿妻秦王綝妻韋盧惟清妻徐饒娥金節婦髙愍女楊烈婦賈直言妻董段居真妻謝楊含妻蕭鄭孝女李廷節妻崔殷保晦妻封絢竇烈婦李拯妻盧山陽女趙周迪妻朱延夀妻王案舊書列女傳無此二十二人新書皆增立可與此證合外戚鄭光案光為宣宗母鄭太后之弟舊書分著始末于太后傳及李景讓傳新書增入外戚可與此證合宦官駱奉先劉貞亮馬存亮嚴遵美仇士良劉克明劉季述張彥𢎞案舊書宦官傳附馬存亮于吐突承璀附仇士良于王守澄附劉季述張彥𢎞于楊復恭新書附駱奉先于舊有之程元振附嚴遵美于分立之馬存亮改張彥𢎞與韓全晦同傳分仇士良劉季述與劉克明各為一傳惟駱奉先嚴遵美劉克明三人舊所未有若劉貞亮即是俱文珍舊已有傳且確著其非兩人而此入新添目內誤矣外國延陀拔野古僕骨同羅吐谷渾契苾羽多覽葛訶嘻葛邏祿拔悉蜜都播骨利幹白霫烏羅渾烏丸鞠俞折駮馬大漢黠戛斯沙陀流鬼跋祿迦摩揭陀寧逺吐火羅謝䫻識匿箇失蜜骨咄蘇毗師子南詔上南詔下蒙嶲詔越析詔浪穹詔邆睒詔施浪詔扶南投和瞻博室利佛逝名蔑單單昆明傍望諸蠻西原蠻案吐谷渾白霫烏羅渾南詔舊書已有傳此亦入新添目內殆以簡略宜加詳歟其延陀拔野古僕骨同羅契苾羽多覽葛訶嘻葛邏祿拔悉蜜都播骨利幹黠戞斯沙陀流鬼摩揭陀寧逺吐火羅謝䫻識匿箇失蜜骨咄蘇毗師子蒙嶲詔越析詔浪穹詔邆睒詔施浪詔扶南投和瞻博室利佛逝名蔑單單西原蠻並為新書所增立又附烏丸鞠俞折駮馬大漢于白霫後附跋祿迦于龜兹後附昆明蠻新安城傍六姓蠻望蠻于兩㸑蠻後悉可與此證合姦臣蔣玄暉張廷範朱友恭案舊書不題姦臣新書增立以三人列栁璨後叛臣陳敬瑄案舊書不題叛臣以敬瑄附宦官田令孜傳新書改入逆臣董昌案舊書無傳新書增列逆臣秦宗權後舊志十一種禮儀音樂厯天文五行地理職官輿服經籍食貨刑法新志三種儀衛選舉兵表四種宰相方鎮宗室世系宰相世系唐書著于五代幅裂之際成篇迫遽殊未詳悉故有詔纂緝十餘年矣今廣內藏書之盛傳記可以質據者得大衍景福之歷而律歷志可完矣得職該六典之書而百官志可完矣得開元曲臺禮郊祀録而禮樂志可完矣若劉昫抵牾之甚蒙竊能道其一二或缺而不傳如賈循南霽雲之忠李翺武平一之文張志和武攸緒之髙尚是也或立傳而無所沮勸若竇德明夏侯孜之循默祖孝孫傅仁均之曲藝龎嚴李景儉之疏放是也或缺其本而不載若張巡之哭廟興兵顔杲卿之指衣定謀是也或事淺近而書若牛僧孺太平之對楊再思諂二張之美是也或善惡同傳若李石之與僧孺楊綰之與常衮是也或子孫無大善而析以别傳若蕭俯不附蕭華杜元穎不附如晦是也案此總論舊唐書特傳同傳題傳别傳附傳之抵牾所指缺而不傳之李翺武攸緒未入前新添目內似前目有脫漏而李翺在舊書雖未列文苑已與韓愈同傳實未嘗缺武攸緒舊附外戚武承嗣後或嫌其善惡同傳固宜如新書之改列隱逸乃概謂之缺而不傳亦未諦審謹因校刋附識唐書直筆卷四
