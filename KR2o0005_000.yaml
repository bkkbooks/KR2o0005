body:
  text: 唐書直筆目録史評類卷一帝紀卷二帝紀卷三列傳志摘舊史繁文闕誤卷四新例須知臣等謹案唐書直筆宋吕夏卿撰夏卿字縉叔泉州晉江人舉進士為江寧尉歴官宣徳郎守秘書丞以預修唐書告成擢直秘閣同知禮院後出知潁州卒于官事迹具宋史夲傳攷曽公亮進唐書表所列預纂修者七人夏卿居其第六本傳稱夏卿學長于史貫穿唐書博采傳記雜説數百家折衷整比又通譜學創為世系諸表于新唐書最有功是唐書雖分題歐陽脩宋祁之名而夏卿編摩之力亦不在脩祁下也據晁公武讀書志是書乃其在書局時所建明歐宋間有取焉所有未符乃歐宋所未取者然是丹者非素論甘者忌辛著述之家各行所見其取者未必皆是其不取者亦未必皆非觀前三卷論紀傳志之修改及舊史繁文闕誤第四卷為新例須知即所擬發凡也晁氏别載夏卿兵志三卷稱得于宇文時中季䝉題其後曰夏卿修唐史别著兵志三篇自秘之戒其子弟勿妄傳鮑欽止吏部好藏書苦求得之其子無為太守恭孫偶言及因懇借鈔録于吳興之山齋云云然則夏卿之于唐書蓋别有所見特弗似吳縝之顯攻耳今兵志已不可見刋存是書以資互攷亦未始非參訂異同之助矣乾隆四十七年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:20389f3e64a09da9fabd6492e0cadb90bf4c81e6288c8c15d72bdbe7a1a33fa3
