body:
  text: 唐書直筆卷三宋呂夏卿撰列傳第二先後列傳之作其體有二一曰年二曰事年以先後之事次之傳以年時為先後之差以事迹相類同傳特傳備賢愚紀成敗功髙行稱特傳若魏文公裴度陸贄韓愈皆特立一傳推父祖以本之係子孫以終之孝子之志務在顯親人情重于繼體每傳必備載祖父名諡官爵或梗槩其事實傳末必歴譜其子孫之世以終始之功效不著于世則父祖之名略之削子孫之係以别他傳攷名字載郡縣如房琯字次律席豫字建侯賀知章字季真皆㕘攷舊集而得其字舊史皆不書韓文公南陽人也舊史以為昌黎人如此之類皆以郡望書非史法也徳業不著而事闗一時者附而不名如武后時宰相張光輔崔元綜等昭宗時宰相朱朴鄭綮等齪齪備位不足立傳附于狄仁傑蕭遘陸扆等傳賜姓賜姓之例出于近世旌功烈而親之也悖臣節而不軌則復其姓如李寶臣當為張寶臣是也四夷所生非功業垂世則見于本國如僕固懐恩背叛不宜立傳見于本國鐵勒傳題傳題傳之目羣傳以姓特傳以名功髙以事迹偽以地題傳起于司馬遷班固至范蔚宗離而徧題之文繁不一失史法之舊羣傳以姓如李白杜甫同傳是也特傳以名如韓愈李徳裕傳皆具姓名題之是也功髙以事如張柬之桓彦範等傳題曰五王傳是也案舊書中宗本紀神龍元年五月封敬暉平陽郡王桓彦範扶陽郡王張柬之漢陽郡王袁恕已南陽郡王崔𤣥暐海陵郡王並加授特進罷知政事又桓彦範傳云武三思居中用事日夕讒毁彦範等帝竟用三思計進封彦範等雖外示優崇實奪其權新書本紀不書封王而書罷至列傳則題曰五王迹偽以地者如李正己呉少誠傳題曰淄青李正己傳淮西呉少誠傳是也案舊書分次列傳新書改題藩鎮必題者歴代前史取法史記滑稽刺客佞幸循吏酷吏貨殖游俠日者龜筴之題故儒林忠義孝友隠逸節婦等傳如此之類既不可離而徧題之是則題傳之目不可廢也宗室宗室之子雖有功徳亦承本傳如李適之李臯李孝逸李暠李常李巨李國貞各附本祖常山王曹王鄭王淮安王吳王虢王傳尚親也凡列傳之類有六冠以后妃尊也次宗室諸王親也列以僭國受命之始也序以一時之君臣善惡之總也繼以四夷王化之及也終以逆臣成敗之歸也后妃傳次以宗室宗室傳次以十八帝諸子題曰髙祖諸子傳不當㕘列傳之間盖班固取其㕘連一時之事故離列傳之間唐室諸王不出閤未嘗干預時政不測成敗不立勞效前序母氏所生後載子孫相承以備一代史書之體故不當循班例既條列十八帝諸子之後次李密王世充以下至黄巢秦宗權而傳終凡褒者卒月貶者卒年其餘從略有功徳則壽如韓愈傳書曰寶厯元年十二月卒褒也韋臯傳曰貞元二十一年卒貶也有功徳則壽年若干謹終也郭子儀傳書曰年八十五李晟傳書曰年六十五諡贈諡贈之數非功徳不書懲及幸也諡法及贈官非其人有功徳則不書論議論議表章以明君上之得失補國家之利害非當時所通行則不書如舊史李百藥傳載封建論朱敬則傳載五等論白居易傳興元微之書今皆削而不載論貨殖之弊陳禮樂之原則志之如陸贄諌置瓊林大盈二庫狀韓文公請遷明皇帝議禘祫議皆附貨殖及郊祀志疏軍旅之宜斥姦邪之惡則見之他傳如韓文公淮西招討事宜及黄家賊事宜狀見于元濟傳及南蠻傳陸贄論裴延齡見于延齡傳辭雖隠非所以便世梗槩其事而略其辭疏之所陳不足以通行則槩舉其事不復勝載詩賦之作足以揄揚國體而明功烈則見之如杜甫三大禮賦李白明堂賦宜見之本傳元結中興頌見之安史傳栁宗元方城皇武二雅見之裴度李愬傳詔策之實足以信後代則摭其辭詔告君命削其繁誣而載其實事則見之本傳官爵官爵升易不常所居有善則書如鄭餘慶傳官至殿中御史别無異迹皆不書至遷工部侍郎知吏部選事上疏論列諸葛述事案述原本訛迹今校改一節可稱則具書官不爾則否循吏儒林文苑忠烈孝友隠逸節婦皆得一端則標其傳而總目之其餘若酷吏文藝皆不足訓世皆不標其傳名也文苑之名起于范蔚宗如賈至父子李白杜甫王𢎞中等不特以藝文見稱故别立傳不在文苑傳中外戚外戚之家恩澤所授謹厚則無稱侈汰則害教其名附于本傳惟卓然殊尤者立傳若竇徳明獨孤懐恩武承嗣韋温等附于太穆元貞則天韋后傳惟呉溆呉湊兄弟可以别立一傳案唐書獨孤懐恩元貞皇后弟之子呉溆章敬皇后之弟原本訛元貞為貞元訛淑為淑今並校改皇后傳皇后之傳編世家之間居列傳之末㕘帝紀之下子長孟堅蔚宗之短也酌古今之法則冠于列傳之首惟陳壽得之子長以外戚世禄傳襲舄奕則編之世家而諸后不顯孟堅以元后事連居攝故綴諸后于列傳之末王莽之前以便叙事而後人踵之非通制也天子之尊海内無二雖皇后之貴有臣妾之體蔚宗作紀則君臣之誼混矣故冠之列傳進退得史之體帝王之興必有内助家道正則天下正每帝必載后妃舊史文宗不立后妃武宗王賢妃事闕今取楊嗣復傳事立賢妃傳據李徳裕兩朝獻替記徳妃暴薨事備王徳妃傳則叙事之體具矣妃嬪之愛歿而定諡或以后稱則傳其實不書后武恵妃稱貞順獨孤貴妃稱貞懿是也王者之母雖生實妃縁帝者心莫不欲顯親而申養故特以太后稱元獻楊太后章敬呉太后睿真沈太后懿安郭太后孝明鄭太后恭僖王太后貞獻蕭太后元昭鼂太后皆以子貴不稱皇后入廟稱后義繫于夫在廟稱太后義縁于子皇太后臨朝總治政事由已則以皇太后某氏稱其餘皇后因子踐阼申尊崇而加號則通以皇后稱則天皇太后武氏順聖皇太后韋氏皆以臨朝書也韋氏獲罪于天下而國史定名不及于懲惡故韋氏亦以皇太后書舊史題為韋庶人史之過也公主附后傳之下而出降皆書惟大功勲則異傳平陽公主太平鎮國公主莊懿長公主附太穆竇皇后武后鄭太后傳案鄭太后憲宗妃不當以代宗女莊懿公主附此條有訛脱志第三天文志司馬遷作史記備載當時沿革為八書攟漢興以來之事有平準河渠封禪之書錄歴代相承之迹有禮樂律厯之書辨古今未明之疑有天官書及班固纂漢書加以刑法郊祀五行郡國藝文名曰十志其天文志仍載四方經星二十八舍躔離之次踵子長天官之舊而日月星辰謫蝕隕石之變復存于五行志是繁冗之失中也郡國車服志唐室十八帝之盛百禮交舉志當時正朔用厯之本曰律厯焉志邦國財用曰貨殖焉志禮樂之沿襲曰禮樂焉志宗廟鬼神之常祀曰郊祀焉志髙宗武后明皇登封降神之禮曰封禪焉志氣沴之侵奸曰五行焉志邦國之闊狹户口之衆寡曰地理焉志經籍之總目曰藝文焉志旂章之物色曰車服焉凡兩都宫闕制度園籞之規模一朝之舊章也廐牧孳乳之數騋牝圈印之名車輅出入征伐武事所急有國之常用也然而歴代未嘗志其名數非通制也兩都宫闕志于郡國之下天下廐牧乘馬之數志于車服之末亦紀事之體也贊論史記八書漢書十志或有贊論而不必皆備盖于事未盡梗槩其事而總斷焉後人務欲極文采之麗每志必有贊是拘儒繁文之病也摘繁文闕誤第四唐書舊史繁蕪闕誤多矣今觕舉大較于左髙祖紀髙祖紀武徳四年十月趙郡王孝恭平荆州獲蕭銑十一月㑹稽賊帥李子通以其地來䧏謹按銑及子通傳銑自度救兵不至便率官屬緦纕布幘詣李靖軍䧏請無殺掠銑䧏後數日江南救兵十餘萬一時大至然則銑䧏得亡國之禮識天命之正漢之田横未足比也本紀縱不足異文亦不當書獲近乎誣矣子通為杜伏威將王雄誕所攻窮􅕚請䧏伏威執之送于京師盡収其地是子通不以地䧏紀之誤也太宗紀太宗紀多載潛龍撥亂之功夫帝王之位非積勞力而致太宗征戰如破魏公而斬宋老生皆王業始基之迹當見之髙祖紀敗薛舉䧏仁杲走宋金剛平劉武周滅建徳俘世充翦黒闥擒圓朗當見之僭國傳武徳九年九月丁未引諸衞兵統將習射于顯徳殿及每日引數百人于殿前教射自是士卒皆為精鋭天生五材孰能去兵自古皆有武備焉太宗以萬乗之尊躬教弧矢帝王之道未為得也載之本紀于文為繁當見突厥傳以示備豫如實錄稱其年十二月癸未太宗謂司空裴寂曰比有上書奏事朕黏之屋壁出入觀省如此之類見于本紀之末如漢文帝紀載賜張武之金以愧其心罷露臺以惜費皆帝王之上徳故國史之法備載以示也八月甲子即位舊載八月癸亥髙祖傳位于皇太子太宗即位于東宫實則髙祖以癸亥詔太宗以甲子即位日異而事别不書甲子之日是即位遽而父子之道失矣太宗肅宗之例既一而告天之文或載或不載于紀是史法失于繁簡也以實錄攷之是年宋秦二州慶雲見泰州定州景星見鳯皇赤雀麒麟騶虞元狐見于雋台洛麟沂鄭等州當載之本紀也貞觀十八年吐谷渾執行人鴻臚丞趙道徳吐谷渾傳云趙徳楷未知紀傳孰是明皇紀睿宗明皇紀景雲二年五月辛丑西城公主為金仙公主隆昌公主為玊真公主仍置金仙玊真觀開元二年六月内出珠玊繡服等令于正殿前焚之謹按睿宗實錄云三月癸丑制為皇女金仙玉真公主于京城各置一觀仍以金仙玊真為名以年厯推之五月無辛丑明皇實錄云七月内出珠玊錦繡于殿前焚之是二紀日月有誤又景雲二年八月韋安石為左僕射同中書門下三品當在庚申而誤書丁巳開元二年七月襄王重茂薨當書丁未而誤為辛未十一月庚寅葬殤帝實錄書辛夘如此之類實多如天寶十三載九月上御勤政樓試四科制舉人加詩賦實錄所書則是年十月含光殿試舉人加詩賦又十三年十月乙巳畢國公竇􅞓薨當在十二月而誤書十月本紀所書日月尤不足信也明皇以延和元年八月受内禪改元先天其年行事猶繫之睿宗至二年十二月改元開元則其年自正月以下皆明皇行事不當復稱先天二年尚附睿宗紀也愚謂開元冠年即位明皇踐位之始年也睿宗紀先天元年八月庚子帝傳位于皇太子明皇紀復云七月壬子制皇太子可即皇帝位二紀日月誤矣明皇紀載安禄山叛逆之迹繁複不當非成敗之繫當書之禄山本傳載于紀者如十一月丙寅安禄山起漁陽十二月辛卯安禄山陷陳留甲午陷滎陽丁酉陷東京辛丑皇太子帥師討禄山十五載六月乙未皇帝幸蜀丙寅誅楊國忠七月庚申皇帝幸蜀其餘車駕所次皆書禄山本傳從省文春秋之法四時具為年舊史或闕一月或闕一時不書首月多矣憲宗紀元和不書四年正月惟以四月贅二年十二月下簡編之闕也元獻皇后傳元獻楊皇后傳云開元十七年葬細栁原明皇命張説為誌文云石獸澀兮綠苔黏宿草殘兮白露霑園陵閉兮脂粉暗不知何年兮開鏡奩按張説集節閔太子妃楊氏墓誌云初上在東宫妃有女弟選為良媛生忠王又載鞠養忠王之事然則元獻傳云肅宗撫鞠于王妃又引張説誌文皆誤也疑元獻之薨不在開元十七年劉昫誤以節閔妃為元獻后也程懐直傳徳宗紀貞元二年六月横海程日華卒以其子懐直權知軍州事十年三月懐直來朝賜安業宅復令還鎮十一年九月滄州大將程懐信逐其帥程懐直為左龍武統軍至六年十二月己丑卒猶以左龍武統軍程懐直卒書于紀而本傳云懐直以為懐信所逐因來朝覲徳宗優容之賜甲第懐信卒懐直子執恭知留後事乃遣懐直歸滄州十六年卒年四十九按順宗紀貞元二十一年七月癸巳横海軍節度使滄州刺史程懐信卒以子副使執恭起復滄州刺史横海軍節度使是懐直先卒六年然後執恭總留務以是明之執恭非懐直之子懐直未嘗復歸滄州傳之誤也孔巢父傳孔巢父傳建中四年宣慰魏博而徳宗紀云建中四年十二月癸酉命孔巢父淄青宣慰紀之誤也巢父傳不書啖守盈出使而書守盈遇害傳之闕也韓愈傳韓文公父仲卿謹按李白武昌令韓君去思碑及李翺皇甫湜文公行狀神道碑則仲卿以銅陵尉補武昌令徙鄱陽令終校書郎本傳云無名位謬矣文公安定桓王茂五世孫又雲卿有名大厯間亦當見文公傳首如漢書司馬遷揚雄傳例又李翺皇甫湜張籍侯喜賈島李賀文公之髙弟也孟郊李觀盧仝文公所與也皆無卓然殊尤之實附于文公傳末如漢書唐林尊見于兩龔傳此叙事之體也唐書直筆卷三
